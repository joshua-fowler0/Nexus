<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3d"/>
      <stop offset="100%" style="stop-color:#0e1225"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7cf7"/>
      <stop offset="50%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#5a4bd1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6c5ce7" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="url(#bg)"/>
  
  <!-- Subtle corner accents -->
  <circle cx="220" cy="220" r="180" fill="url(#glow)" opacity="0.3"/>
  <circle cx="804" cy="804" r="180" fill="url(#glow)" opacity="0.2"/>
  
  <!-- Diamond shape — main logo -->
  <g filter="shadow" transform="translate(512, 490)">
    <!-- Outer diamond -->
    <polygon points="0,-220 200,0 0,220 -200,0" fill="url(#diamond)" opacity="0.15" transform="scale(1.15)"/>
    <!-- Main diamond -->
    <polygon points="0,-200 180,0 0,200 -180,0" fill="url(#diamond)"/>
    <!-- Inner highlight -->
    <polygon points="0,-140 126,0 0,140 -126,0" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="24" fill="#e8ecf4" opacity="0.9"/>
    <!-- Top facet highlight -->
    <polygon points="0,-200 180,0 0,-40" fill="#a78bfa" opacity="0.25"/>
  </g>
  
  <!-- "NEXUS" text below diamond -->
  <text x="512" y="810" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" letter-spacing="18" fill="#e8ecf4" opacity="0.9">NEXUS</text>
</svg>
